<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Results · Breakaway Timing</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .action-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .action-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.6rem 1.25rem;
      border: 1px solid #333;
      background: #111;
      color: #888;
      cursor: pointer;
      transition: all 0.2s;
    }
    .action-btn:hover { border-color: #f5f5f0; color: #f5f5f0; }
    .action-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    #podiumView { display: none; }

    .podium-race-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 2rem;
    }
    .podium-category { margin-bottom: 2rem; border: 1px solid #222; }
    .podium-category-header {
      background: #111;
      padding: 0.75rem 1.25rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #f5f5f0;
      border-bottom: 1px solid #222;
    }
    .podium-places {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: #222;
    }
    .podium-place { background: #0a0a0a; padding: 1.5rem; text-align: center; }
    .podium-medal { font-size: 1.75rem; display: block; margin-bottom: 0.4rem; }
    .podium-pos { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; line-height: 1; color: #333; }
    .podium-place:nth-child(1) .podium-pos { color: #FFD700; }
    .podium-place:nth-child(2) .podium-pos { color: #C0C0C0; }
    .podium-place:nth-child(3) .podium-pos { color: #CD7F32; }
    .podium-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1rem; margin-top: 0.4rem; color: #f5f5f0; }
    .podium-team { font-size: 0.75rem; color: #666; margin-top: 0.2rem; }
    .podium-time { font-size: 0.85rem; color: #888; margin-top: 0.35rem; font-family: monospace; }
    .podium-empty { font-size: 0.8rem; color: #444; font-style: italic; }

    @media print {
      nav, footer, .controls-row, .action-row, .status-bar, #tableView,
      .podium-medal, .podium-pos, .podium-team { display: none !important; }
      #podiumView { display: block !important; }
      .page-header { display: none !important; }
      body { background: white; color: black; font-family: Arial, sans-serif; font-size: 11px; margin: 0; padding: 12px; }
      .podium-race-label { font-size: 10px; color: #000; margin-bottom: 8px; display: block; }
      .podium-category { border: none; margin-bottom: 0; page-break-inside: avoid; }
      .podium-category-header { background: none; color: black; border: none; border-bottom: 1px solid #000; padding: 4px 0; font-size: 10px; font-weight: bold; letter-spacing: 0.05em; }
      .podium-places { display: block; background: none; }
      .podium-place { background: none; padding: 2px 0 2px 8px; text-align: left; border: none; }
      .podium-name { font-size: 11px; color: black; font-weight: normal; margin: 0; display: inline; }
      .podium-name::before { content: attr(data-pos) ". "; font-weight: bold; }
      .podium-time { font-size: 10px; color: #000; margin: 0; display: inline; margin-left: 6px; }
      .podium-empty { font-size: 10px; color: #000; }
      #podiumContent { columns: 2; column-gap: 24px; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="index.html">
      <img src="logo.jpg" alt="Breakaway Timing" />
      <span>Breakaway Timing</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="results.html" class="active">Results</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <div class="page-header">
    <div class="page-header-inner">
      <p class="section-label">Live &amp; Historical</p>
      <h1 class="section-title">Race Results</h1>
    </div>
  </div>

  <div class="results-section">

    <div class="controls-row">
      <select class="styled-select" id="raceDropdown">
        <option value="LIVE">🔴 Live Results</option>
      </select>
      <select class="styled-select" id="categoryDropdown">
        <option value="ALL">All Categories</option>
      </select>
    </div>

    <div class="action-row">
      <button class="action-btn" id="btnDownloadCSV" disabled>⬇ Download CSV</button>
      <button class="action-btn" id="btnDownloadPDF" disabled>⬇ Download PDF</button>
      <button class="action-btn" id="btnPrintResults" disabled>🖨 Print Results</button>
      <button class="action-btn" id="btnPodium"      disabled>🏆 Show Podiums</button>
      <button class="action-btn" id="btnPrintPodium" disabled>🖨 Print Podiums</button>
    </div>

    <div class="status-bar">
      <span id="lastUpdated">Last updated: —</span>
      <span id="liveIndicator"><span class="live-dot"></span> Live</span>
    </div>

    <div id="tableView">
      <div class="results-table-wrap">
        <table id="resultsTable">
          <thead>
            <tr>
              <th>#</th><th>Bib</th><th>Rider</th>
              <th>Team / Affiliation</th><th>Category</th><th>Time</th><th>Gap</th>
            </tr>
          </thead>
          <tbody id="resultsBody">
            <tr><td colspan="7" style="text-align:center;padding:3rem;color:var(--mid);">Waiting for results...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div id="podiumView">
      <p class="podium-race-label" id="podiumRaceLabel"></p>
      <div id="podiumContent"></div>
    </div>

  </div>

  <footer>
    <div class="footer-logo">Breakaway Timing</div>
    <ul class="footer-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="results.html">Results</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <p class="footer-copy">© 2026 Breakaway Timing · breakawayracetiming@gmail.com</p>
  </footer>

  <script>
    const REFRESH_MS   = 15000;
    const FIREBASE_URL = "https://breakaway-timing-results-default-rtdb.europe-west1.firebasedatabase.app";

    let lastGeneratedAt  = null;
    let lastPayload      = null;
    let currentRows      = [];
    let selectedCategory = "ALL";
    let selectedRace     = "LIVE";
    let pollingTimer     = null;
    let podiumVisible    = false;

    const raceDropdown     = document.getElementById("raceDropdown");
    const categoryDropdown = document.getElementById("categoryDropdown");
    const resultsBody      = document.getElementById("resultsBody");
    const lastUpdatedEl    = document.getElementById("lastUpdated");
    const liveIndicator    = document.getElementById("liveIndicator");
    const tableView        = document.getElementById("tableView");
    const podiumView       = document.getElementById("podiumView");
    const podiumContent    = document.getElementById("podiumContent");
    const podiumRaceLabel  = document.getElementById("podiumRaceLabel");
    const btnCSV           = document.getElementById("btnDownloadCSV");
    const btnPDF           = document.getElementById("btnDownloadPDF");
    const btnPrintResults  = document.getElementById("btnPrintResults");
    const btnPodium        = document.getElementById("btnPodium");
    const btnPrint         = document.getElementById("btnPrintPodium");

    loadRaceIndex();
    startPolling();

    raceDropdown.addEventListener("change", () => {
      selectedRace     = raceDropdown.value || "LIVE";
      selectedCategory = "ALL";
      lastGeneratedAt  = null;
      lastPayload      = null;
      categoryDropdown.innerHTML = '<option value="ALL">All Categories</option>';
      categoryDropdown.value = "ALL";
      hidePodium();
      if (selectedRace === "LIVE") {
        liveIndicator.style.display = "";
        startPolling();
      } else {
        liveIndicator.style.display = "none";
        stopPolling();
        loadHistoricRace(selectedRace);
      }
    });

    categoryDropdown.addEventListener("change", () => {
      selectedCategory = categoryDropdown.value || "ALL";
      if (lastPayload) renderResults(lastPayload);
      hidePodium();
    });

    btnPodium.addEventListener("click", () => { podiumVisible ? hidePodium() : showPodium(); });

    btnPrint.addEventListener("click", () => {
      if (!lastPayload) return;
      printPodiumList(lastPayload);
    });

    btnPrintResults.addEventListener("click", () => {
      if (!lastPayload) return;
      printResultsByCategory(lastPayload);
    });

    function showPodium() {
      if (!lastPayload) return;
      buildPodium(lastPayload);
      tableView.style.display  = "none";
      podiumView.style.display = "block";
      btnPodium.textContent    = "📋 Show Table";
      podiumVisible = true;
    }

    function hidePodium() {
      tableView.style.display  = "block";
      podiumView.style.display = "none";
      btnPodium.textContent    = "🏆 Show Podiums";
      podiumVisible = false;
    }

    function buildPodium(data) {
      const label = selectedRace === "LIVE"
        ? "Live Results — " + new Date(data.generatedAt).toLocaleTimeString()
        : (data.raceLabel || data.raceId);
      podiumRaceLabel.textContent = label;

      const byCategory = {};
      const events = toArray(data.events);

      for (const ev of events) {
        for (const r of toArray(ev.results)) {
          const place    = clean(r.place || "");
          const bib      = clean(r.bib || "");
          const category = clean(r.category || "Uncategorized");
          const firstName = clean(r.firstName || "");
          const lastName  = clean(r.lastName || "");
          const rider    = (firstName && lastName) ? firstName + " " + lastName : (lastName || firstName);
          const team     = clean(r.team || r.affiliation || "");
          const time     = clean(r.time || "");

          if (isHeader(bib) || isHeader(rider)) continue;
          if (!place && !bib && !rider) continue;
          if (selectedCategory !== "ALL" && category !== selectedCategory) continue;

          if (!byCategory[category]) byCategory[category] = [];
          byCategory[category].push({ place, rider, team, time });
        }
      }

      const medals    = ["🥇", "🥈", "🥉"];
      const positions = ["1st", "2nd", "3rd"];

      podiumContent.innerHTML = Object.keys(byCategory).sort().map(cat => {
        const top3 = byCategory[cat].slice(0, 3);
        const places = [0, 1, 2].map(i => {
          const r = top3[i];
          if (!r) return `<div class="podium-place"><span class="podium-medal">${medals[i]}</span><div class="podium-pos">${positions[i]}</div><div class="podium-empty">—</div></div>`;
          return `<div class="podium-place">
            <span class="podium-medal">${medals[i]}</span>
            <div class="podium-pos">${positions[i]}</div>
            <div class="podium-name" data-pos="${i+1}">${r.rider}</div>
            ${r.team ? `<div class="podium-team">${r.team}</div>` : ""}
            ${r.time ? `<div class="podium-time">${r.time}</div>` : ""}
          </div>`;
        }).join("");
        return `<div class="podium-category"><div class="podium-category-header">${cat}</div><div class="podium-places">${places}</div></div>`;
      }).join("");
    }

    btnCSV.addEventListener("click", () => {
      if (!currentRows.length) return;
      const headers = ["Place","Bib","Rider","Team","Category","Time","Gap"];
      const rows    = currentRows.map(r => [r.catPlace, r.bib, r.rider, r.team, r.category, r.time, r.gap]);
      const csv     = [headers, ...rows].map(row => row.map(v => `"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
      const name    = (lastPayload ? (lastPayload.raceLabel || lastPayload.raceId || "results") : "results").replace(/\s+/g,"_");
      const cat     = selectedCategory !== "ALL" ? `_${selectedCategory}` : "";
      downloadBlob(`${name}${cat}.csv`, "text/csv", csv);
    });

    btnPDF.addEventListener("click", () => {
      if (!currentRows.length) return;
      const raceName = lastPayload ? (lastPayload.raceLabel || lastPayload.raceId || "Results") : "Results";
      const catLabel = selectedCategory !== "ALL" ? ` — ${selectedCategory}` : "";
      const title    = `${raceName}${catLabel}`;
      const rows     = currentRows.map(r => `<tr><td>${r.catPlace}</td><td>${r.bib}</td><td>${r.rider}</td><td>${r.team}</td><td>${r.category}</td><td>${r.time}</td><td>${r.gap}</td></tr>`).join("");
      const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>${title}</title>
        <style>body{font-family:Arial,sans-serif;font-size:11px;margin:20px}h1{font-size:18px;margin-bottom:4px}.sub{color:#000;font-size:10px;margin-bottom:16px}table{width:100%;border-collapse:collapse}th{background:#000;color:#fff;padding:6px 8px;text-align:left;font-size:10px;letter-spacing:.05em;text-transform:uppercase}td{padding:5px 8px;border-bottom:1px solid #000}tr:nth-child(even)td{background:white}.ft{margin-top:16px;font-size:9px;color:#000}</style>
        </head><body>
        <h1>${title}</h1><div class="sub">${lastUpdatedEl.textContent} · Breakaway Timing</div>
        <table><thead><tr><th>#</th><th>Bib</th><th>Rider</th><th>Team</th><th>Category</th><th>Time</th><th>Gap</th></tr></thead><tbody>${rows}</tbody></table>
        <div class="ft">Generated by Breakaway Timing · breakawaytiming.com</div>
        </body></html>`;
      const win = window.open("", "_blank");
      win.document.write(html);
      win.document.close();
      setTimeout(() => win.print(), 500);
    });

    function loadRaceIndex() {
      fetch(FIREBASE_URL + "/race_index.json")
        .then(r => r.json())
        .then(index => {
          if (!index) return;
          Object.values(index).sort((a,b) => (b.generatedAt||"").localeCompare(a.generatedAt||"")).forEach(r => {
            const opt = document.createElement("option");
            opt.value = r.raceId;
            opt.textContent = r.raceLabel || r.raceId;
            raceDropdown.appendChild(opt);
          });
          raceDropdown.value = "LIVE";
        })
        .catch(err => console.warn("Failed to load race index:", err));
    }

    function loadHistoricRace(raceId) {
      lastUpdatedEl.textContent = "Loading...";
      showPlaceholder();
      fetch(FIREBASE_URL + "/race_history/" + encodeURIComponent(raceId) + ".json")
        .then(r => r.json())
        .then(data => {
          if (!data) { lastUpdatedEl.textContent = "No data found."; return; }
          lastPayload = data;
          renderResults(data);
        })
        .catch(err => { console.warn(err); lastUpdatedEl.textContent = "Failed to load."; });
    }

    function startPolling() { stopPolling(); refreshResults(); pollingTimer = setInterval(refreshResults, REFRESH_MS); }
    function stopPolling()  { if (pollingTimer) { clearInterval(pollingTimer); pollingTimer = null; } }

    function refreshResults() {
      fetch(FIREBASE_URL + "/live_race.json")
        .then(r => r.json())
        .then(data => {
          if (!data || !data.generatedAt) return;
          if (data.generatedAt === lastGeneratedAt) return;
          lastGeneratedAt = data.generatedAt;
          lastPayload     = data;
          renderResults(data);
        })
        .catch(err => console.warn("Auto-refresh failed:", err));
    }

    function renderResults(data) {
      lastUpdatedEl.textContent = selectedRace === "LIVE"
        ? "Last updated: " + new Date(data.generatedAt).toLocaleTimeString()
        : "Race: " + (data.raceLabel || data.raceId);

      const out = [];
      const categorySet = new Set();

      for (const ev of toArray(data.events)) {
        for (const r of toArray(ev.results)) {
          const place     = clean(r.place || "");
          const bib       = clean(r.bib || "");
          const time      = clean(r.time || "");
          const firstName = clean(r.firstName || "");
          const lastName  = clean(r.lastName || "");
          const rider     = (firstName && lastName) ? firstName + " " + lastName : (lastName || firstName);
          const team      = clean(r.team || r.affiliation || "");
          const category  = clean(r.category || "");
          const gap       = clean(r.gap || "");

          if (category) categorySet.add(category);
          if (selectedCategory !== "ALL" && category !== selectedCategory) continue;
          if (isHeader(bib) || isHeader(rider)) continue;
          if (!place && !bib && !rider && !time) continue;
          out.push({ place, bib, rider, team, category, time, gap });
        }
      }

      updateCategoryDropdown(Array.from(categorySet).sort());

      if (out.length === 0) { showPlaceholder(); setEnabled(false); return; }

      out.forEach((row, i) => { row.catPlace = i + 1; });
      currentRows = out;

      resultsBody.innerHTML = out.map(row => `
        <tr>
          <td>${row.catPlace}</td><td>${row.bib}</td><td>${row.rider}</td><td>${row.team}</td>
          <td>${row.category ? `<span class="badge">${row.category}</span>` : ""}</td>
          <td>${row.time}</td><td style="color:var(--mid)">${row.gap}</td>
        </tr>`).join("");

      setEnabled(true);
      if (podiumVisible) buildPodium(data);
    }

    function setEnabled(v) { [btnCSV, btnPDF, btnPrintResults, btnPodium, btnPrint].forEach(b => b.disabled = !v); }

    function printResultsByCategory(data) {
      const byCategory = {};
      for (const ev of toArray(data.events)) {
        for (const r of toArray(ev.results)) {
          const place     = clean(r.place || "");
          const bib       = clean(r.bib || "");
          const category  = clean(r.category || "Uncategorized");
          const firstName = clean(r.firstName || "");
          const lastName  = clean(r.lastName || "");
          const rider     = (firstName && lastName) ? firstName + " " + lastName : (lastName || firstName);
          const team      = clean(r.team || r.affiliation || "");
          const time      = clean(r.time || "");
          const gap       = clean(r.gap || "");
          if (isHeader(bib) || isHeader(rider)) continue;
          if (!place && !bib && !rider && !time) continue;
          if (selectedCategory !== "ALL" && category !== selectedCategory) continue;
          if (!byCategory[category]) byCategory[category] = [];
          byCategory[category].push({ place, bib, rider, team, time, gap });
        }
      }

      const raceName = selectedRace === "LIVE"
        ? "Live Results — " + new Date(data.generatedAt).toLocaleTimeString()
        : (data.raceLabel || data.raceId);

      const pages = Object.keys(byCategory).sort().map((cat, idx) => {
        const results = byCategory[cat];
        const rows = results.map((r, i) => `
          <tr class="${i % 2 === 0 ? "even" : ""}">
            <td class="place">${i + 1}</td>
            <td class="bib">${r.bib}</td>
            <td class="name">${r.rider}${r.team ? `<span class="team"><br>${r.team}</span>` : ""}</td>
            <td class="time">${r.time}</td>
            <td class="gap">${r.gap}</td>
          </tr>`).join("");
        const pageBreak = idx > 0 ? 'style="page-break-before: always;"' : "";
        return `
          <div class="page" ${pageBreak}>
            <div class="page-header">
              <div class="race-name">${raceName}</div>
              <div class="cat-name">${cat}</div>
              <div class="meta">Breakaway Timing · breakawaytiming.com</div>
            </div>
            <table>
              <thead>
                <tr><th>#</th><th>Bib</th><th>Rider / Team</th><th>Time</th><th>Gap</th></tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
            <div class="footer">${results.length} finisher${results.length !== 1 ? "s" : ""} · Printed ${new Date().toLocaleString()}</div>
          </div>`;
      }).join("");

      const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"/>
        <title>Results — ${raceName}</title>
        <style>
          * { box-sizing: border-box; margin: 0; padding: 0; }
          body { font-family: Arial, sans-serif; font-size: 11px; color: #000; background: white; }
          .page { padding: 20px 24px; }
          .page-header { border-bottom: 2px solid #000; padding-bottom: 8px; margin-bottom: 12px; }
          .race-name { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: #000; }
          .cat-name { font-size: 20px; font-weight: bold; margin: 2px 0; }
          .meta { font-size: 9px; color: #000; }
          table { width: 100%; border-collapse: collapse; }
          thead tr { background: #000; color: #fff; }
          th { padding: 5px 8px; text-align: left; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; }
          td { padding: 5px 8px; border-bottom: 1px solid #000; vertical-align: top; }
          tr.even td { background: white; }
          .place { width: 30px; font-weight: bold; }
          .bib { width: 40px; }
          .name { font-weight: 500; }
          .team { font-size: 9px; color: #000; font-weight: normal; }
          .time { width: 80px; font-family: monospace; }
          .gap { width: 80px; font-family: monospace; }
          .footer { margin-top: 10px; font-size: 9px; color: #000; border-top: 1px solid #000; padding-top: 6px; }
        </style></head><body>
        ${pages}
        <script>window.onload = function(){ window.print(); }<\/script>
        </body></html>`;

      const win = window.open("", "_blank");
      win.document.write(html);
      win.document.close();
    }

    function updateCategoryDropdown(categories) {
      const current = Array.from(categoryDropdown.options).map(o => o.value).join(",");
      if (current === ["ALL",...categories].join(",")) return;
      const prev = categoryDropdown.value;
      categoryDropdown.innerHTML = '<option value="ALL">All Categories</option>';
      categories.forEach(c => { const o = document.createElement("option"); o.value = c; o.textContent = c; categoryDropdown.appendChild(o); });
      categoryDropdown.value = categories.includes(prev) ? prev : "ALL";
      selectedCategory = categoryDropdown.value;
    }

    function showPlaceholder() {
      currentRows = [];
      resultsBody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:3rem;color:var(--mid);">Waiting for results...</td></tr>`;
    }

    function downloadBlob(filename, mime, content) {
      const a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([content], { type: mime }));
      a.download = filename;
      a.click();
    }

    function printPodiumList(data) {
      const byCategory = {};
      for (const ev of toArray(data.events)) {
        for (const r of toArray(ev.results)) {
          const place     = clean(r.place || "");
          const bib       = clean(r.bib || "");
          const category  = clean(r.category || "Uncategorized");
          const firstName = clean(r.firstName || "");
          const lastName  = clean(r.lastName || "");
          const rider     = (firstName && lastName) ? firstName + " " + lastName : (lastName || firstName);
          const team      = clean(r.team || r.affiliation || "");
          const time      = clean(r.time || "");
          if (isHeader(bib) || isHeader(rider)) continue;
          if (!place && !bib && !rider) continue;
          if (selectedCategory !== "ALL" && category !== selectedCategory) continue;
          if (!byCategory[category]) byCategory[category] = [];
          byCategory[category].push({ rider, team, time });
        }
      }

      const raceName = selectedRace === "LIVE"
        ? "Live Results — " + new Date(data.generatedAt).toLocaleTimeString()
        : (data.raceLabel || data.raceId);

      const positions = ["1st", "2nd", "3rd"];

      const sections = Object.keys(byCategory).sort().map(cat => {
        const top3 = byCategory[cat].slice(0, 3);
        const rows = top3.map((r, i) =>
          `<tr><td class="pos">${positions[i]}</td><td class="name">${r.rider}${r.team ? `<span class="team"> — ${r.team}</span>` : ""}</td><td class="time">${r.time}</td></tr>`
        ).join("");
        return `<div class="cat"><div class="cat-header">${cat}</div><table>${rows}</table></div>`;
      }).join("");

      const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"/>
        <title>Podiums — ${raceName}</title>
        <style>
          body { font-family: Arial, sans-serif; font-size: 11px; margin: 16px; color: #000; }
          h2 { font-size: 13px; margin: 0 0 4px; }
          .sub { font-size: 9px; color: #000; margin-bottom: 12px; }
          .grid { columns: 2; column-gap: 20px; }
          .cat { break-inside: avoid; margin-bottom: 10px; }
          .cat-header { font-weight: bold; font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #000; padding-bottom: 2px; margin-bottom: 4px; }
          table { width: 100%; border-collapse: collapse; }
          td { padding: 2px 4px; font-size: 11px; }
          .pos { width: 28px; font-weight: bold; color: #000; }
          .time { width: 70px; text-align: right; color: #000; font-family: monospace; }
          .team { color: #000; font-size: 10px; }
          .name { }
          .footer { margin-top: 12px; font-size: 9px; color: #000; border-top: 1px solid #000; padding-top: 6px; }
        </style></head><body>
        <h2>Podium Results — ${raceName}</h2>
        <div class="sub">Breakaway Timing · breakawaytiming.com</div>
        <div class="grid">${sections}</div>
        <div class="footer">Printed ${new Date().toLocaleString()}</div>
        <script>window.onload = function(){ window.print(); }<\/script>
        </body></html>`;

      const win = window.open("", "_blank");
      win.document.write(html);
      win.document.close();
    }

    function toArray(v) { if (!v) return []; if (Array.isArray(v)) return v; return Object.values(v); }
    function clean(v)   { const s = String(v ?? "").trim(); return (s === "#N/A" || s.toUpperCase() === "N/A") ? "" : s; }
    function isHeader(v){ return ["bib","first name","last name","firstname","lastname"].includes(String(v||"").trim().toLowerCase()); }
  </script>

</body>
</html>
